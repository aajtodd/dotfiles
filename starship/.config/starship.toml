# Starship prompt config. Stowed to ~/.config/starship.toml
# https://starship.rs/config/
# Base: official "tokyo-night" preset (requires a Nerd Font, e.g. JetBrains Mono Nerd Font).
"$schema" = 'https://starship.rs/config-schema.json'

format = """
[░▒▓](#a3aed2)\
[  ](bg:#a3aed2 fg:#090c0c)\
[](bg:#769ff0 fg:#a3aed2)\
$hostname\
$directory\
[](fg:#769ff0 bg:#394260)\
$git_branch\
$git_status\
$git_state\
[](fg:#394260 bg:#1d2230)\
$aws\
$cmd_duration\
[ ](fg:#1d2230)\
\n$character"""

[hostname]
# Shown only in SSH sessions (ssh_only defaults true; detects SSH_CONNECTION).
# Sits on the directory block's blue bg, so it needs no separator of its own and
# collapses cleanly to nothing when local.
ssh_only = true
ssh_symbol = "󰢹 "
trim_at = "."
style = "fg:#090c0c bg:#769ff0"
format = "[ $ssh_symbol$hostname ]($style)"

[directory]
style = "fg:#e3e5e5 bg:#769ff0"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "…/"

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = " "
"Pictures" = " "

[git_branch]
symbol = ""
style = "bg:#394260"
format = '[[ $symbol $branch ](fg:#769ff0 bg:#394260)]($style)'

[git_status]
style = "bg:#394260"
format = '[[($all_status$ahead_behind )](fg:#769ff0 bg:#394260)]($style)'

[git_state]
style = "bg:#394260"
# e.g. REBASING 2/5, MERGING, CHERRY-PICKING -- shown only mid-operation
format = '[[\($state( $progress_current/$progress_total)\) ](fg:#e0af68 bg:#394260)]($style)'

[aws]
symbol = "  "
style = "bg:#1d2230"
format = '[[ $symbol($profile )(\($region\) )](fg:#a0a9cb bg:#1d2230)]($style)'

[cmd_duration]
min_time = 2000 # only show when a command takes longer than 2s
style = "bg:#1d2230"
format = '[[ 󱎫 $duration ](fg:#a0a9cb bg:#1d2230)]($style)'

# vi-mode indicator on the input line. starship's zsh init installs a
# zle-keymap-select hook that redraws on mode change — updates live, no RPROMPT,
# no custom hook. In emacs keymap you're always "insert".
#
# ACTIVE: mode-COLORED glyph (green ❯ insert / amber ❯ normal). Brief.
# To switch to explicit [I]/[N] text, comment this block and uncomment the next.
[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
vimcmd_symbol = "[❯](bold #e0af68)"

# ALT: explicit [I]/[N] text — uncomment this block and comment the one above.
# [character]
# success_symbol = "[\\[I\\]](bold green)"
# error_symbol = "[\\[I\\]](bold red)"
# vimcmd_symbol = "[\\[N\\]](bold #e0af68)"
