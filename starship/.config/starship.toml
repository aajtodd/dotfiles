# Starship prompt config. Stowed to ~/.config/starship.toml
# https://starship.rs/config/
# Base: official "tokyo-night" preset (requires a Nerd Font, e.g. JetBrains Mono Nerd Font).
"$schema" = 'https://starship.rs/config-schema.json'

format = """
[░▒▓](#a3aed2)\
[  ](bg:#a3aed2 fg:#090c0c)\
[](bg:#769ff0 fg:#a3aed2)\
$directory\
[](fg:#769ff0 bg:#394260)\
$git_branch\
$git_status\
$git_state\
[](fg:#394260 bg:#1d2230)\
$aws\
$cmd_duration\
[ ](fg:#1d2230)\
\n$character"""

[directory]
style = "fg:#e3e5e5 bg:#769ff0"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "…/"

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = " "
"Pictures" = " "

[git_branch]
symbol = ""
style = "bg:#394260"
format = '[[ $symbol $branch ](fg:#769ff0 bg:#394260)]($style)'

[git_status]
style = "bg:#394260"
format = '[[($all_status$ahead_behind )](fg:#769ff0 bg:#394260)]($style)'

[git_state]
style = "bg:#394260"
# e.g. REBASING 2/5, MERGING, CHERRY-PICKING -- shown only mid-operation
format = '[[\($state( $progress_current/$progress_total)\) ](fg:#e0af68 bg:#394260)]($style)'

[aws]
symbol = "  "
style = "bg:#1d2230"
format = '[[ $symbol($profile )(\($region\) )](fg:#a0a9cb bg:#1d2230)]($style)'

[cmd_duration]
min_time = 2000 # only show when a command takes longer than 2s
style = "bg:#1d2230"
format = '[[ 󱎫 $duration ](fg:#a0a9cb bg:#1d2230)]($style)'
